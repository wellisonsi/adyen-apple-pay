<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>Apple Pay + Adyen API-only TEST</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 720px;
      margin: 40px auto;
      padding: 20px;
      background: #f5f5f5;
      color: #222;
    }

    h1 {
      margin: 0 0 24px;
      color: #222;
      font-size: 28px;
      line-height: 1.2;
    }

    #apple-pay-button {
      -webkit-appearance: -apple-pay-button;
      -apple-pay-button-type: buy;
      -apple-pay-button-style: black;
      display: none;
      width: 240px;
      height: 44px;
      border-radius: 6px;
      margin-bottom: 20px;
      cursor: pointer;
    }

    pre {
      background: #fff;
      border: 1px solid #ddd;
      padding: 16px;
      border-radius: 8px;
      overflow-x: auto;
      font-size: 12px;
      max-height: 420px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .status {
      padding: 12px;
      border-radius: 4px;
      margin-bottom: 16px;
      display: none;
    }

    .status.success {
      background: #d4edda;
      color: #155724;
      display: block;
    }

    .status.error {
      background: #f8d7da;
      color: #721c24;
      display: block;
    }

    .status.info {
      background: #d1ecf1;
      color: #0c5460;
      display: block;
    }
  </style>
</head>
<body>

<h1>Apple Pay + Adyen API-only</h1>

<div id="status" class="status"></div>
<div id="apple-pay-button" role="button" aria-label="Comprar com Apple Pay"></div>

<h3>Resposta da API:</h3>
<pre id="result">Inicializando...</pre>

<script>
const API_BASE_URL = window.location.origin;

let checkoutConfig = null;
let applePayPaymentMethod = null;
const apiHistory = [];

function showStatus(message, type = "info") {
  const el = document.getElementById("status");
  el.textContent = message;
  el.className = `status ${type}`;
}

function log(data, title = "") {
  const prefix = title ? `${title}\n\n` : "";
  const text = typeof data === "string" ? data : JSON.stringify(data, null, 2);
  document.getElementById("result").textContent = prefix + text;
  console.log(title || "LOG:", data);
}

function appendLog(title, data) {
  apiHistory.push({
    title,
    data,
    at: new Date().toISOString()
  });
  log(apiHistory, "Historico API");
}

async function api(path, body) {
  const response = await fetch(`${API_BASE_URL}${path}`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body || {})
  });

  const responseText = await response.text();
  let payload;

  try {
    payload = responseText ? JSON.parse(responseText) : {};
  } catch (error) {
    throw {
      error: "O servidor respondeu em um formato inesperado.",
      status: response.status,
      statusText: response.statusText,
      contentType: response.headers.get("content-type"),
      body: responseText
    };
  }

  if (!response.ok) {
    appendLog(`Erro ${path}`, payload);
    throw payload;
  }

  appendLog(`Resposta ${path}`, payload);
  return payload;
}

function base64EncodeObject(value) {
  const bytes = new TextEncoder().encode(JSON.stringify(value));
  let binary = "";
  const chunkSize = 0x8000;

  for (let i = 0; i < bytes.length; i += chunkSize) {
    binary += String.fromCharCode(...bytes.subarray(i, i + chunkSize));
  }

  return btoa(binary);
}

function amountForApplePay(amount) {
  return (amount.value / 100).toFixed(2);
}

function mapNetwork(brand) {
  const networks = {
    amex: "amex",
    discover: "discover",
    mc: "masterCard",
    visa: "visa"
  };

  return networks[brand] || brand;
}

function supportedNetworks() {
  const brands = applePayPaymentMethod?.brands || ["visa", "mc", "amex"];
  return [...new Set(brands.map(mapNetwork))];
}

async function loadPaymentMethods() {
  const response = await api("/paymentMethods", {
    amount: { currency: "BRL", value: 10000 },
    countryCode: "BR"
  });

  checkoutConfig = response.config;
  applePayPaymentMethod = response.adyenResponse.paymentMethods?.find(
    paymentMethod => paymentMethod.type === "applepay"
  );

  if (!applePayPaymentMethod) {
    throw {
      error: "Apple Pay nao veio no /paymentMethods.",
      hint: "Confira se Apple Pay esta habilitado para o merchantAccount na Adyen.",
      adyenResponse: response.adyenResponse
    };
  }

  return response;
}

async function createApplePayMerchantSession(event) {
  const applePayConfiguration = applePayPaymentMethod.configuration || {};

  if (!applePayConfiguration.merchantId || !applePayConfiguration.merchantName) {
    throw {
      error: "A Adyen nao retornou merchantId/merchantName para Apple Pay.",
      paymentMethod: applePayPaymentMethod
    };
  }

  const response = await api("/apple-pay-session", {
    validationURL: event.validationURL,
    displayName: applePayConfiguration.merchantName,
    domainName: window.location.hostname,
    merchantIdentifier: applePayConfiguration.merchantId
  });

  return response.applePaySession;
}

async function makePayment(event) {
  const applePayToken = base64EncodeObject(event.payment.token.paymentData);

  return api("/payments", {
    amount: checkoutConfig.amount,
    reference: `APPLEPAY-API-${Date.now()}`,
    returnUrl: `${API_BASE_URL}/return`,
    applePayToken
  });
}

function startApplePay() {
  const applePayConfiguration = applePayPaymentMethod.configuration || {};
  const request = {
    countryCode: checkoutConfig.countryCode,
    currencyCode: checkoutConfig.amount.currency,
    merchantCapabilities: ["supports3DS"],
    supportedNetworks: supportedNetworks(),
    total: {
      label: applePayConfiguration.merchantName || "Enjupay",
      amount: amountForApplePay(checkoutConfig.amount),
      type: "final"
    }
  };

  appendLog("Abrindo Apple Pay", { request, applePayPaymentMethod, checkoutConfig });

  const session = new ApplePaySession(3, request);

  session.onpaymentmethodselected = event => {
    appendLog("Metodo Apple Pay selecionado", {
      paymentMethod: event.paymentMethod
    });

    session.completePaymentMethodSelection({
      newTotal: request.total
    });
  };

  session.onvalidatemerchant = async event => {
    try {
      showStatus("Validando merchant Apple Pay...", "info");
      const merchantSession = await createApplePayMerchantSession(event);
      session.completeMerchantValidation(merchantSession);
      appendLog("Merchant Apple Pay validado", { merchantSession });
    } catch (error) {
      showStatus("Falha na validacao merchant Apple Pay", "error");
      appendLog("Erro validacao merchant", error);
      session.abort();
    }
  };

  session.onpaymentauthorized = async event => {
    try {
      appendLog("Apple Pay autorizado", {
        payment: event.payment
      });

      showStatus("Enviando pagamento para Adyen...", "info");
      const paymentResponse = await makePayment(event);
      const resultCode = paymentResponse.payment?.resultCode;
      const success = resultCode === "Authorised";

      session.completePayment(
        success
          ? ApplePaySession.STATUS_SUCCESS
          : ApplePaySession.STATUS_FAILURE
      );

      showStatus(`Pagamento ${success ? "concluido" : "falhou"}: ${resultCode}`, success ? "success" : "error");
      appendLog("Pagamento finalizado", paymentResponse);
    } catch (error) {
      session.completePayment(ApplePaySession.STATUS_FAILURE);
      showStatus("Falha ao processar pagamento", "error");
      appendLog("Erro /payments", error);
    }
  };

  session.oncancel = event => {
    showStatus("Apple Pay cancelado", "info");
    appendLog("Apple Pay cancelado", {
      eventType: event.type,
      note: "Se nao houver evento 'Apple Pay autorizado' antes deste, o Safari cancelou antes de entregar o token ao JavaScript."
    });
  };

  session.begin();
}

async function init() {
  if (window.location.protocol === "file:") {
    showStatus("Abra a pagina pela URL do servidor", "error");
    log("Nao abra o apple.html direto como arquivo. Use a URL HTTPS do Render.");
    return;
  }

  if (!window.isSecureContext) {
    showStatus("Apple Pay exige HTTPS", "error");
    log(`Abra esta pagina por HTTPS.\nURL atual: ${window.location.href}`);
    return;
  }

  if (!window.ApplePaySession) {
    showStatus("Apple Pay JS nao esta disponivel neste navegador", "error");
    log("Teste no Safari com Apple Pay configurado.");
    return;
  }

  try {
    showStatus("Buscando metodos de pagamento...", "info");
    const paymentMethodsResponse = await loadPaymentMethods();

    if (!ApplePaySession.canMakePayments()) {
      showStatus("Apple Pay indisponivel neste dispositivo", "error");
      appendLog("Apple Pay indisponivel", paymentMethodsResponse);
      return;
    }

    document.getElementById("apple-pay-button").style.display = "block";
    document.getElementById("apple-pay-button").addEventListener("click", startApplePay);

    showStatus("Apple Pay pronto", "success");
    appendLog("Apple Pay pronto", paymentMethodsResponse);
  } catch (error) {
    showStatus(error.error || error.message || "Erro ao inicializar", "error");
    appendLog("Erro inicializacao", error);
  }
}

window.addEventListener("DOMContentLoaded", init);
</script>

</body>
</html>
